services:
  attacker:
    build:
      context: ../
      dockerfile: docker/attacker/openstack.Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../:/incalmo
      - frontend-ignore:/incalmo/incalmo/frontend
      - venv-volume:/incalmo/.venv
      - /home/lakshmi/perry_key.pem:/root/perry_key.pem:ro
    networks:
      custom_net:
        ipv4_address: 172.28.1.225
    ports:
      - 8888:8888
      - "6379:6379"
      - 5678:5678

volumes:
  venv-volume:
  frontend-ignore:

networks:
  custom_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1